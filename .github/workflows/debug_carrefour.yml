name: Debug bonarea

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run debug
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python debug_bonarea.py
