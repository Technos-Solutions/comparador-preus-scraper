name: Normalitzador v2 (Gemini + caché)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Scraper Part 5 - Carrefour"]
    types:
      - completed

jobs:
  normalitzar:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install gspread oauth2client google-generativeai
      - name: Run normalitzador_v2
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python normalitzador_v2.py
