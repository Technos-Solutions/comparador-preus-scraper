name: Normalitzador v2 (Groq + caché)

on:
  workflow_dispatch:

jobs:
  normalitzar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install gspread oauth2client groq
      - name: Run normalitzador_v2
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python normalitzador_v2.py
